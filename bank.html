<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Банк — Фройские Маги</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080812;--panel:#0e0e1f;--panel2:#131328;--panel3:#1a1a35;
  --accent:#7b5ea7;--accent2:#a67fd1;
  --gold:#c9a84c;--gold-l:#e8c96e;--gold-d:#8a6a20;
  --text:#e8e0f0;--text-dim:#7a6f90;--text-mid:#b0a0c8;
  --life:#e05c5c;--line:#2a1f45;--green:#4cbb8a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;
  min-height:100vh;padding:24px 16px 80px;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(201,168,76,.07) 0%,transparent 65%),
    radial-gradient(1px 1px at 12% 18%,rgba(255,240,180,.13) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 10%,rgba(255,240,180,.09) 0%,transparent 100%),
    radial-gradient(1px 1px at 5%  76%,rgba(255,240,180,.07) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 70%,rgba(255,240,180,.10) 0%,transparent 100%);}
.wrap{max-width:880px;margin:0 auto;position:relative;z-index:1;}

/* ── HEADER ── */
.header{text-align:center;padding:26px 20px 18px;border:1px solid rgba(201,168,76,.28);
  border-radius:12px;background:var(--panel);margin-bottom:20px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 70% at 50% 50%,rgba(201,168,76,.08) 0%,transparent 70%);}
.hd-deco{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:200px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.bank-title{font-family:'Cinzel',serif;font-size:clamp(16px,4.5vw,22px);font-weight:700;
  letter-spacing:5px;color:var(--gold-l);text-shadow:0 0 28px rgba(201,168,76,.4);position:relative;}
.bank-tagline{font-size:12px;color:var(--text-dim);font-style:italic;margin-top:5px;position:relative;}
.back-link{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-dim);
  text-decoration:none;border:1px solid var(--line);padding:6px 12px;border-radius:5px;
  transition:all .2s;z-index:1;}
.back-link:hover{color:var(--gold);border-color:var(--gold-d);}

/* ── SECTION TITLE ── */
.stitle{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-d),transparent);}

/* ── CHAR SELECT ── */
.char-select{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.char-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;padding:8px 18px;
  border-radius:20px;border:1px solid var(--line);background:none;color:var(--text-dim);
  cursor:pointer;transition:all .2s;}
.char-btn:hover{border-color:var(--gold-d);color:var(--text);}
.char-btn.active{border-color:var(--gold);color:var(--gold-l);background:rgba(201,168,76,.08);}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:620px){.layout{grid-template-columns:1fr;}}

/* ── PANEL ── */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;}

/* ── REAGENT ROW ── */
.reag-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.reag-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;
  background:var(--panel2);border:1px solid var(--line);}
.reag-chip-icon{font-size:16px;}
.reag-chip-count{font-family:'Cinzel',serif;font-size:12px;color:var(--gold-l);}

/* ── DEPOSIT FORM ── */
.form-label{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:2px;color:var(--text-dim);
  margin-bottom:7px;}

/* reagent inputs */
.reag-inputs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.ri-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.ri-icon{font-size:18px;}
.ri-input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:5px;
  color:var(--text);font-family:'Cinzel',serif;font-size:14px;text-align:center;
  padding:6px 2px;outline:none;transition:border-color .2s;}
.ri-input:focus{border-color:var(--gold);}
.ri-input::-webkit-inner-spin-button,.ri-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.ri-input[type=number]{-moz-appearance:textfield;}
.ri-label{font-family:'Cinzel',serif;font-size:6px;letter-spacing:.8px;color:var(--text-dim);}

/* item add row */
.item-add-row{display:grid;grid-template-columns:1fr 2fr;gap:6px;margin-bottom:8px;}
.item-input{background:var(--panel2);border:1px solid var(--line);border-radius:5px;
  color:var(--text);font-family:'Crimson Pro',serif;font-size:13px;padding:7px 10px;
  outline:none;transition:border-color .2s;width:100%;}
.item-input:focus{border-color:var(--gold);}

/* action buttons */
.btn-row{display:flex;gap:8px;}
.btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;padding:9px 16px;
  border-radius:7px;border:1px solid;cursor:pointer;transition:all .2s;}
.btn-in{border-color:rgba(201,168,76,.4);color:var(--gold);background:rgba(201,168,76,.07);}
.btn-in:hover{background:rgba(201,168,76,.18);border-color:var(--gold);}
.btn-in:disabled{opacity:.35;cursor:not-allowed;}
.btn-out{border-color:var(--line);color:var(--text-dim);background:none;}
.btn-out:hover{border-color:var(--gold-d);color:var(--text);}
.btn-out:disabled{opacity:.35;cursor:not-allowed;}

/* ── VAULT LIST ── */
.vault-empty{font-size:12px;color:var(--text-dim);font-style:italic;
  text-align:center;padding:24px 0;}
.vault-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;
  background:var(--panel2);border:1px solid var(--line);margin-bottom:5px;transition:border-color .15s;}
.vault-item:hover{border-color:var(--gold-d);}
.vault-item-name{font-family:'Cinzel',serif;font-size:10px;color:var(--text);flex:1;}
.vault-item-desc{font-size:10px;color:var(--text-dim);font-style:italic;}
.vault-item-take{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1px;padding:3px 10px;
  border-radius:5px;border:1px solid var(--line);color:var(--text-dim);background:none;
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.vault-item-take:hover{border-color:var(--gold);color:var(--gold);}

/* ── INV LIST ── */
.inv-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;
  background:var(--panel2);border:1px solid var(--line);margin-bottom:5px;transition:all .15s;}
.inv-item:hover{border-color:var(--gold-d);}
.inv-item-name{font-family:'Cinzel',serif;font-size:10px;color:var(--text);flex:1;}
.inv-item-desc{font-size:10px;color:var(--text-dim);font-style:italic;}
.inv-item-send{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1px;padding:3px 10px;
  border-radius:5px;border:1px solid rgba(201,168,76,.3);color:var(--gold-d);background:none;
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;opacity:0;}
.inv-item:hover .inv-item-send{opacity:1;}
.inv-item-send:hover{border-color:var(--gold);color:var(--gold);}

/* ── BANK INFO (bottom) ── */
.bank-info-panel{background:var(--panel);border:1px solid rgba(201,168,76,.2);border-radius:12px;
  padding:20px;margin-top:16px;}
.bank-info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:12px;}
.info-card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;}
.info-card-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;color:var(--text-dim);margin-bottom:5px;}
.info-card-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold-l);}
.info-card-sub{font-size:11px;color:var(--text-dim);margin-top:3px;font-style:italic;}

/* security pips */
.sec-pips{display:flex;gap:3px;margin-top:6px;}
.sec-pip{height:7px;flex:1;border-radius:2px;background:rgba(42,31,69,.7);}

/* ── LOADING ── */
.full-load{text-align:center;padding:50px;font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:2px;color:var(--text-dim);}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel3);border:1px solid var(--gold-d);border-radius:8px;padding:10px 24px;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold-l);
  opacity:0;transition:all .3s;pointer-events:none;z-index:999;}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <a class="back-link" href="map.html">← Карта</a>
    <div class="hd-deco"></div>
    <div class="bank-title" id="hd-title">🏛 БАНК</div>
    <div class="bank-tagline" id="hd-tagline">Загрузка…</div>
  </div>

  <div class="full-load" id="main-load">⟳ Загружаем банк…</div>

  <div id="main" style="display:none;">

    <!-- char selector -->
    <div class="stitle">ПЕРСОНАЖ</div>
    <div class="char-select" id="char-select"></div>

    <div class="layout" id="layout-grid">

      <!-- LEFT: vault (what's stored) -->
      <div class="panel">
        <div class="stitle">МОЁ ХРАНИЛИЩЕ</div>

        <!-- stored reagents -->
        <div class="form-label">РЕАГЕНТЫ В БАНКЕ</div>
        <div class="reag-row" id="vault-reags">
          <div style="font-size:11px;color:var(--text-dim);font-style:italic;">Выберите персонажа</div>
        </div>

        <!-- stored items -->
        <div class="form-label" style="margin-top:4px;">ПРЕДМЕТЫ В БАНКЕ</div>
        <div id="vault-items">
          <div class="vault-empty">—</div>
        </div>
      </div>

      <!-- RIGHT: deposit form -->
      <div class="panel">
        <div class="stitle">ОПЕРАЦИЯ</div>

        <!-- reagent amounts -->
        <div class="form-label">РЕАГЕНТЫ (количество для операции)</div>
        <div class="reag-inputs">
          <div class="ri-wrap"><div class="ri-icon">🔴</div>
            <input class="ri-input" id="r-red"    type="number" min="0" value="0">
            <div class="ri-label">КРАСНЫЙ</div></div>
          <div class="ri-wrap"><div class="ri-icon">🔵</div>
            <input class="ri-input" id="r-blue"   type="number" min="0" value="0">
            <div class="ri-label">СИНИЙ</div></div>
          <div class="ri-wrap"><div class="ri-icon">🟢</div>
            <input class="ri-input" id="r-green"  type="number" min="0" value="0">
            <div class="ri-label">ЗЕЛЁНЫЙ</div></div>
          <div class="ri-wrap"><div class="ri-icon">🟡</div>
            <input class="ri-input" id="r-yellow" type="number" min="0" value="0">
            <div class="ri-label">ЖЁЛТЫЙ</div></div>
        </div>

        <div class="btn-row" style="margin-bottom:18px;">
          <button class="btn btn-in"  id="btn-dep-r" onclick="depositReags()"  disabled>↓ Внести реагенты</button>
          <button class="btn btn-out" id="btn-wit-r" onclick="withdrawReags()" disabled>↑ Изъять реагенты</button>
        </div>

        <!-- item deposit -->
        <div class="form-label">ПРЕДМЕТ ИЗ ИНВЕНТАРЯ → В БАНК</div>
        <div class="item-add-row">
          <input class="item-input" id="new-item-name" placeholder="Название предмета…">
          <input class="item-input" id="new-item-desc" placeholder="Описание (необязательно)…">
        </div>
        <div class="btn-row" style="margin-bottom:18px;">
          <button class="btn btn-in" id="btn-dep-item" onclick="depositItem()" disabled>↓ Положить предмет</button>
        </div>

        <!-- inventory items quick-send -->
        <div class="form-label">ИЗ ИНВЕНТАРЯ (быстрый выбор)</div>
        <div id="inv-items"><div class="vault-empty" style="padding:12px 0;">Выберите персонажа</div></div>
      </div>

    </div><!-- /layout -->

    <!-- BANK INFO (bottom) -->
    <div class="bank-info-panel" id="bank-info-panel" style="display:none;">
      <div class="stitle">О БАНКЕ</div>
      <div id="bank-desc-text" style="font-size:13px;color:var(--text-dim);font-style:italic;margin-bottom:14px;"></div>
      <div class="bank-info-grid" id="bank-info-grid"></div>
    </div>

  </div><!-- /main -->

</div>
<div id="toast"></div>

<script src="config.js"></script>
<script src="sheets.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// Google Sheets лист "banks":
//   name | title | tagline | owner | security | storage_fee | description
//
//   security     — строка описания (напр. "85% — охраняется гвардией")
//   storage_fee  — строка (напр. "2 красных реагента в месяц")
//   description  — полное описание банка
//
// Firebase /bank/{bankName}/{charUUID}/ →
//   reagents: { red, blue, green, yellow }
//   items:    [ { name, desc } ]
// ═══════════════════════════════════════════════════════════════════════════

const FB       = FIREBASE_CONFIG.databaseURL;
const bankName = decodeURIComponent(new URLSearchParams(location.search).get('bank_name') || 'bank');
const BANK_FB  = `bank/${encodeURIComponent(bankName)}`;

const REAG = ['red','blue','green','yellow'];
const REAG_ICON = { red:'🔴', blue:'🔵', green:'🟢', yellow:'🟡' };
const REAG_NAME = { red:'Красный', blue:'Синий', green:'Зелёный', yellow:'Жёлтый' };

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let bankMeta  = null;
let selChar   = null;
let vaultSnap = null; // { reagents, items }

// ── Firebase ───────────────────────────────────────────────────────────────
const fbGet   = async p => { try { const r = await fetch(`${FB}/${p}.json`); return r.ok ? r.json() : null; } catch { return null; } };
const fbSet   = async (p,v) => { try { await fetch(`${FB}/${p}.json`, {method:'PUT',  headers:{'Content-Type':'application/json'}, body:JSON.stringify(v)}); } catch {} };
const fbPatch = async (p,v) => { try { await fetch(`${FB}/${p}.json`, {method:'PATCH',headers:{'Content-Type':'application/json'}, body:JSON.stringify(v)}); } catch {} };

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t); t._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, dur);
}

// ── Load bank from Sheets ──────────────────────────────────────────────────
async function loadBankMeta() {
  document.getElementById('hd-title').textContent = '🏛 ' + bankName.toUpperCase();
  try {
    const rows = await sheetsGet('banks');
    const row  = rows.find(r => (r.name||'').trim().toLowerCase() === bankName.toLowerCase());
    if (row) {
      bankMeta = {
        title:       row.title       || bankName,
        tagline:     row.tagline     || row.description || '',
        owner:       row.owner       || '—',
        security:    row.security    || '—',
        storage_fee: row.storage_fee || row['плата']   || '—',
        description: row.description || '',
        robbery_chance: row.robbery_chance || row['шанс_ограбления'] || '—',
      };
    }
  } catch {}

  if (!bankMeta) bankMeta = { title: bankName, tagline:'', owner:'—', security:'—', storage_fee:'—', description:'', robbery_chance:'—' };

  document.getElementById('hd-title').textContent   = '🏛 ' + bankMeta.title.toUpperCase();
  document.getElementById('hd-tagline').textContent = bankMeta.tagline;
  document.title = bankMeta.title + ' — Банк';

  // Render info panel
  const panel = document.getElementById('bank-info-panel');
  const desc  = document.getElementById('bank-desc-text');
  const grid  = document.getElementById('bank-info-grid');

  if (bankMeta.description) desc.textContent = bankMeta.description;

  const chips = [
    { label:'ВЛАДЕЛЕЦ',          val: bankMeta.owner },
    { label:'БЕЗОПАСНОСТЬ',       val: bankMeta.security,    sub:'Уровень защиты хранилища' },
    { label:'ШАНС ОГРАБЛЕНИЯ',    val: bankMeta.robbery_chance, sub:'Решает Мастер' },
    { label:'ПЛАТА ЗА ХРАНЕНИЕ',  val: bankMeta.storage_fee, sub:'Взимается Мастером вручную' },
  ];

  grid.innerHTML = '';
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'info-card';
    el.innerHTML = `<div class="info-card-label">${c.label}</div>
      <div class="info-card-val" style="font-size:${String(c.val).length > 10 ? '12px' : '15px'}">${esc(c.val)}</div>
      ${c.sub ? `<div class="info-card-sub">${c.sub}</div>` : ''}`;
    grid.appendChild(el);
  });

  panel.style.display = '';
}

// ── Local chars ────────────────────────────────────────────────────────────
function loadLocalChars() {
  const out = [];
  try {
    const idx = JSON.parse(localStorage.getItem('froyskyy_chars_index')) || [];
    idx.forEach(e => {
      try {
        const s = JSON.parse(localStorage.getItem('froyskyy_char_' + e.id));
        if (s?.charUUID) out.push({ ...s, _key: 'froyskyy_char_' + e.id });
      } catch {}
    });
  } catch {}
  if (!out.length) {
    try { const s = JSON.parse(localStorage.getItem('froyskyy_v4')); if (s?.charUUID) out.push({...s, _key:'froyskyy_v4'}); } catch {}
  }
  return out;
}

function buildCharSelect(chars) {
  const wrap = document.getElementById('char-select');
  wrap.innerHTML = '';
  if (!chars.length) { wrap.innerHTML = '<div style="font-size:12px;color:var(--text-dim);font-style:italic;">Нет персонажей</div>'; return; }
  chars.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'char-btn';
    btn.textContent = ch.charName || '—';
    btn.onclick = () => selectChar(ch, btn);
    wrap.appendChild(btn);
  });
}

async function selectChar(ch, btn) {
  selChar = ch;
  document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['btn-dep-r','btn-wit-r','btn-dep-item'].forEach(id => document.getElementById(id).disabled = false);
  await refreshVault();
  renderInvItems();
}

// ── Vault ──────────────────────────────────────────────────────────────────
async function refreshVault() {
  if (!selChar) return;
  vaultSnap = await fbGet(`${BANK_FB}/${selChar.charUUID}`) || { reagents:{}, items:[] };
  renderVaultReags();
  renderVaultItems();
}

function renderVaultReags() {
  const el = document.getElementById('vault-reags');
  el.innerHTML = '';
  const reags = vaultSnap?.reagents || {};
  const has = REAG.some(c => (reags[c]||0) > 0);
  if (!has) { el.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-style:italic;">Нет реагентов</div>'; return; }
  REAG.forEach(c => {
    if (!(reags[c]||0)) return;
    const chip = document.createElement('div');
    chip.className = 'reag-chip';
    chip.innerHTML = `<span class="reag-chip-icon">${REAG_ICON[c]}</span><span class="reag-chip-count">×${reags[c]}</span>`;
    el.appendChild(chip);
  });
}

function renderVaultItems() {
  const el = document.getElementById('vault-items');
  const items = vaultSnap?.items || [];
  if (!items.length) { el.innerHTML = '<div class="vault-empty" style="padding:10px 0;">Нет предметов</div>'; return; }
  el.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'vault-item';
    row.innerHTML = `<div style="flex:1;min-width:0;">
      <div class="vault-item-name">${esc(item.name)}</div>
      ${item.desc ? `<div class="vault-item-desc">${esc(item.desc)}</div>` : ''}
    </div>
    <button class="vault-item-take" onclick="takeItem(${i})">↑ Забрать</button>`;
    el.appendChild(row);
  });
}

function renderInvItems() {
  const el = document.getElementById('inv-items');
  const equip = (selChar?.equipment || []).filter(e => e.name?.trim());
  if (!equip.length) { el.innerHTML = '<div class="vault-empty" style="padding:12px 0;">Инвентарь пуст</div>'; return; }
  el.innerHTML = '';
  equip.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'inv-item';
    row.innerHTML = `<div style="flex:1;min-width:0;">
      <div class="inv-item-name">${esc(item.name)}</div>
      ${item.desc ? `<div class="inv-item-desc">${esc(item.desc)}</div>` : ''}
    </div>
    <button class="inv-item-send" onclick="sendItemFromInv(${i})">↓ В банк</button>`;
    el.appendChild(row);
  });
}

// ── REAGENT DEPOSIT ────────────────────────────────────────────────────────
async function depositReags() {
  if (!selChar) return;
  const amounts = {}; let total = 0;
  REAG.forEach(c => { const v = parseInt(document.getElementById('r-'+c).value)||0; if(v>0){amounts[c]=v;total+=v;} });
  if (!total) { toast('Введите количество реагентов'); return; }

  // Check player has enough
  const pReags = selChar.reagents || {};
  for (const c of REAG) {
    if ((amounts[c]||0) > (pReags[c]||0)) { toast(`Недостаточно: ${REAG_NAME[c]} (есть ${pReags[c]||0})`); return; }
  }

  // Deduct from player
  const nPReags = { ...pReags };
  REAG.forEach(c => { if(amounts[c]) nPReags[c] = (nPReags[c]||0) - amounts[c]; });
  saveReags(nPReags);

  // Add to vault
  const vReags = { ...(vaultSnap?.reagents||{}) };
  REAG.forEach(c => { if(amounts[c]) vReags[c] = (vReags[c]||0) + amounts[c]; });
  await fbPatch(`${BANK_FB}/${selChar.charUUID}`, { reagents: vReags });

  clearReagInputs(); await refreshVault();
  toast('✓ Реагенты внесены в банк');
}

// ── REAGENT WITHDRAW ───────────────────────────────────────────────────────
async function withdrawReags() {
  if (!selChar || !vaultSnap) return;
  const amounts = {}; let total = 0;
  REAG.forEach(c => { const v = parseInt(document.getElementById('r-'+c).value)||0; if(v>0){amounts[c]=v;total+=v;} });
  if (!total) { toast('Введите количество реагентов'); return; }

  const vReags = vaultSnap.reagents || {};
  for (const c of REAG) {
    if ((amounts[c]||0) > (vReags[c]||0)) { toast(`В банке недостаточно: ${REAG_NAME[c]} (есть ${vReags[c]||0})`); return; }
  }

  // Deduct from vault
  const nVReags = { ...vReags };
  REAG.forEach(c => { if(amounts[c]) nVReags[c] = (nVReags[c]||0) - amounts[c]; });
  await fbPatch(`${BANK_FB}/${selChar.charUUID}`, { reagents: nVReags });

  // Add to player
  const pReags = { ...(selChar.reagents||{}) };
  REAG.forEach(c => { if(amounts[c]) pReags[c] = (pReags[c]||0) + amounts[c]; });
  saveReags(pReags);

  clearReagInputs(); await refreshVault();
  toast('✓ Реагенты изъяты из банка');
}

// ── ITEM DEPOSIT (from text inputs) ───────────────────────────────────────
async function depositItem() {
  if (!selChar) return;
  const name = document.getElementById('new-item-name').value.trim();
  const desc = document.getElementById('new-item-desc').value.trim();
  if (!name) { toast('Введите название предмета'); return; }

  const items = [...(vaultSnap?.items||[])];
  items.push({ name, desc });
  await fbPatch(`${BANK_FB}/${selChar.charUUID}`, { items });

  document.getElementById('new-item-name').value = '';
  document.getElementById('new-item-desc').value = '';
  await refreshVault();
  toast(`✓ «${name}» помещён в банк`);
}

// ── ITEM DEPOSIT (from inventory quick-pick) ───────────────────────────────
async function sendItemFromInv(idx) {
  if (!selChar) return;
  const equip = [...(selChar.equipment||[])];
  const item = equip[idx];
  if (!item) return;

  // Remove from player inventory
  equip.splice(idx, 1);
  saveEquip(equip);

  // Add to vault
  const items = [...(vaultSnap?.items||[])];
  items.push({ name: item.name, desc: item.desc||'' });
  await fbPatch(`${BANK_FB}/${selChar.charUUID}`, { items });

  await refreshVault(); renderInvItems();
  toast(`✓ «${item.name}» отправлен в банк`);
}

// ── ITEM TAKE FROM VAULT ───────────────────────────────────────────────────
async function takeItem(idx) {
  if (!selChar || !vaultSnap) return;
  const items = [...(vaultSnap.items||[])];
  const item = items[idx];
  if (!item) return;

  items.splice(idx, 1);
  await fbPatch(`${BANK_FB}/${selChar.charUUID}`, { items });

  const equip = [...(selChar.equipment||[])];
  equip.push({ name: item.name, desc: item.desc||'' });
  saveEquip(equip);

  await refreshVault(); renderInvItems();
  toast(`✓ «${item.name}» возвращён в инвентарь`);
}

// ── SAVE HELPERS ───────────────────────────────────────────────────────────
function saveReags(reags) {
  if (!selChar?._key) return;
  try { const s=JSON.parse(localStorage.getItem(selChar._key))||{}; s.reagents=reags; localStorage.setItem(selChar._key,JSON.stringify(s)); selChar.reagents=reags; } catch {}
}
function saveEquip(equip) {
  if (!selChar?._key) return;
  try { const s=JSON.parse(localStorage.getItem(selChar._key))||{}; s.equipment=equip; localStorage.setItem(selChar._key,JSON.stringify(s)); selChar.equipment=equip; } catch {}
}
function clearReagInputs() { REAG.forEach(c=>document.getElementById('r-'+c).value=0); }

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  await loadBankMeta();
  const chars = loadLocalChars();
  buildCharSelect(chars);
  document.getElementById('main-load').style.display = 'none';
  document.getElementById('main').style.display = '';
}
init();
</script>
