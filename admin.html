<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Администратор — Фройский Маг</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080812;--panel:#0e0e1f;--panel2:#131328;--panel3:#1a1a35;--accent:#7b5ea7;--accent2:#a67fd1;--gold:#c9a84c;--gold-l:#e8c96e;--gold-d:#8a6a20;--text:#e8e0f0;--text-dim:#7a6f90;--text-mid:#b0a0c8;--barrier:#5b8dee;--life:#e05c5c;--line:#2a1f45;--green:#4cbb8a;--orange:#e8934c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;padding:24px 16px 60px;background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(123,94,167,.09) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 20% 80%,rgba(91,141,238,.05) 0%,transparent 60%);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.18) 0%,transparent 100%),radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,.12) 0%,transparent 100%),radial-gradient(1px 1px at 40% 8%,rgba(255,255,255,.15) 0%,transparent 100%),radial-gradient(1px 1px at 85% 40%,rgba(255,255,255,.10) 0%,transparent 100%);}
.sheet{position:relative;max-width:960px;margin:0 auto;z-index:1;}
.header{text-align:center;padding:28px 20px 20px;border:1px solid var(--accent);border-radius:10px;background:var(--panel);margin-bottom:24px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(123,94,167,.12) 0%,transparent 70%);}
.header-deco{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.header h1{font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:6px;color:var(--gold-l);text-shadow:0 0 30px rgba(201,168,76,.4);position:relative;}
.header-sub{font-size:12px;color:var(--accent2);letter-spacing:3px;margin-top:6px;font-style:italic;position:relative;}
.back-link{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-decoration:none;border:1px solid var(--line);padding:6px 12px;border-radius:5px;transition:all .2s;z-index:1;}
.back-link:hover{color:var(--gold);border-color:var(--gold-d);}
.live-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:var(--green);position:absolute;right:16px;top:50%;transform:translateY(-50%);border:1px solid rgba(76,187,138,.3);padding:5px 12px;border-radius:20px;background:rgba(76,187,138,.06);transition:all .3s;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:live-pulse 1.5s ease-in-out infinite;}
.live-badge.offline{color:var(--text-dim);border-color:rgba(122,111,144,.3);background:rgba(122,111,144,.05);}
.live-badge.offline .live-dot{background:var(--text-dim);animation:none;}
@keyframes live-pulse{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.3);}}
.section-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--gold-l);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-d),transparent);}
.stats-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.stat-chip{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 16px;flex:1;min-width:130px;}
.stat-chip-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;color:var(--text-dim);margin-bottom:4px;}
.stat-chip-val{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold-l);}
.arena-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:16px;overflow:hidden;transition:border-color .3s;}
.arena-card.status-waiting{border-color:rgba(201,168,76,.4);}
.arena-card.status-fight{border-color:rgba(224,92,92,.45);}
.arena-card.status-done{border-color:rgba(122,111,144,.25);opacity:.8;}
.arena-card-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,rgba(123,94,167,.05),transparent);flex-wrap:wrap;gap:8px;}
.arena-path{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--text-mid);flex:1;}
.status-pill{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;padding:4px 12px;border-radius:20px;border:1px solid;flex-shrink:0;display:inline-flex;align-items:center;gap:6px;}
.status-pill.waiting{color:var(--gold);border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.08);}
.status-pill.fight{color:var(--life);border-color:rgba(224,92,92,.4);background:rgba(224,92,92,.08);}
.status-pill.done{color:var(--text-dim);border-color:rgba(122,111,144,.3);background:rgba(122,111,144,.05);}
.status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.status-dot.waiting{background:var(--gold);animation:live-pulse 2s ease-in-out infinite;}
.status-dot.fight{background:var(--life);animation:fight-pulse 1s ease-in-out infinite;}
.status-dot.done{background:var(--text-dim);}
@keyframes fight-pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
.fighters-grid{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;padding:16px 18px;}
.fighter-mini{background:var(--panel2);border-radius:8px;padding:12px 14px;border:1px solid var(--line);transition:border-color .3s,opacity .3s;}
.fighter-mini.winner-hl{border-color:rgba(76,187,138,.5);background:rgba(76,187,138,.05);}
.fighter-mini.loser-dim{opacity:.5;}
.fighter-mini.empty-slot{border-style:dashed;display:flex;align-items:center;justify-content:center;min-height:88px;font-size:11px;color:var(--text-dim);font-style:italic;}
.fm-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold-l);margin-bottom:2px;}
.fm-player{font-size:10px;color:var(--text-dim);font-style:italic;margin-bottom:8px;}
.fm-hp{display:flex;flex-direction:column;gap:5px;}
.fm-bar-row{display:flex;align-items:center;gap:7px;}
.fm-lbl{font-family:'Cinzel',serif;font-size:7px;width:14px;flex-shrink:0;}
.fm-lbl.b{color:var(--barrier);}.fm-lbl.l{color:var(--life);}
.fm-bg{flex:1;height:7px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;}
.fm-bar{height:100%;border-radius:3px;transition:width .4s;}
.fm-bar.b{background:linear-gradient(90deg,#3a6fd8,var(--barrier));}
.fm-bar.l{background:linear-gradient(90deg,#c0302a,var(--life));}
.fm-num{font-family:'Cinzel',serif;font-size:8px;width:50px;text-align:right;flex-shrink:0;}
.fm-num.b{color:var(--barrier);}.fm-num.l{color:var(--life);}
.fm-build{margin-top:7px;display:flex;flex-wrap:wrap;gap:3px;}
.fm-mmr{margin-top:6px;font-family:'Cinzel',serif;font-size:8px;color:var(--gold);opacity:.7;}
.vs-mini{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text-dim);text-align:center;letter-spacing:2px;}
.card-footer{padding:10px 18px 14px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(0,0,0,.12);flex-wrap:wrap;}
.card-meta{font-size:10px;color:var(--text-dim);font-style:italic;}
.card-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.abtn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;padding:6px 14px;border-radius:5px;cursor:pointer;transition:all .2s;border:1px solid;background:none;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.abtn-cancel{border-color:rgba(224,92,92,.4);color:var(--life);}
.abtn-cancel:hover{background:rgba(224,92,92,.15);border-color:var(--life);}
.abtn-declare{border-color:rgba(76,187,138,.35);color:var(--green);}
.abtn-declare:hover{background:rgba(76,187,138,.12);border-color:var(--green);}
.abtn-clear{border-color:var(--line);color:var(--text-dim);}
.abtn-clear:hover{border-color:var(--orange);color:var(--orange);}
.abtn-open{border-color:rgba(123,94,167,.4);color:var(--accent2);}
.abtn-open:hover{background:rgba(123,94,167,.15);border-color:var(--accent2);}
.empty-state{text-align:center;padding:50px 20px;background:var(--panel);border:1px solid var(--line);border-radius:12px;}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:.3;}
.empty-text{font-size:14px;color:var(--text-dim);font-style:italic;}
#confirm-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(4,4,18,.87);backdrop-filter:blur(5px);align-items:center;justify-content:center;}
#confirm-overlay.show{display:flex;}
.confirm-modal{background:var(--panel);border:1px solid rgba(224,92,92,.35);border-radius:14px;padding:32px 36px;max-width:400px;width:90%;text-align:center;box-shadow:0 16px 60px rgba(0,0,0,.8);animation:min .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes min{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
.confirm-icon{font-size:36px;margin-bottom:14px;}
.confirm-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--life);margin-bottom:8px;}
.confirm-body{font-size:13px;color:var(--text-dim);line-height:1.65;margin-bottom:22px;}
.confirm-actions{display:flex;gap:10px;justify-content:center;}
.confirm-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;padding:10px 24px;border-radius:6px;cursor:pointer;transition:all .2s;border:1px solid;}
.cyes{border-color:var(--life);color:var(--life);background:rgba(224,92,92,.1);}
.cyes:hover{background:rgba(224,92,92,.25);}
.cno{border-color:var(--line);color:var(--text-dim);background:none;}
.cno:hover{border-color:var(--accent2);color:var(--accent2);}
.log-panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-top:24px;}
.log-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-top:10px;}
.log-entry{font-size:11px;padding:5px 8px;border-radius:4px;border-left:2px solid var(--line);display:flex;gap:10px;align-items:flex-start;color:var(--text-dim);}
.log-entry.ok{border-color:var(--green);color:var(--text-mid);}
.log-entry.warn{border-color:var(--orange);color:var(--orange);}
.log-entry.err{border-color:var(--life);color:var(--life);}
.log-time{font-family:monospace;font-size:10px;color:var(--text-dim);flex-shrink:0;margin-top:1px;}
.log-empty{font-size:12px;color:var(--text-dim);font-style:italic;padding:8px 0;text-align:center;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel3);border:1px solid var(--accent);border-radius:8px;padding:10px 22px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold-l);opacity:0;transition:all .3s;pointer-events:none;z-index:999;}
@media(max-width:580px){.fighters-grid{grid-template-columns:1fr;gap:10px;}.vs-mini{display:none;}.stats-bar{flex-direction:column;}.card-footer{flex-direction:column;align-items:flex-start;}}
/* ── BANKS ── */
.banks-panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:24px;}
.bank-table-wrap{overflow-x:auto;margin-top:4px;}
.bank-table{width:100%;border-collapse:collapse;font-size:12px;}
.bank-table th{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:2px;color:var(--text-dim);
  text-align:left;padding:6px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
.bank-table td{padding:8px 10px;border-bottom:1px solid rgba(42,31,69,.5);vertical-align:top;color:var(--text-mid);}
.bank-table tr:last-child td{border-bottom:none;}
.bank-table tr:hover td{background:rgba(123,94,167,.05);}
.btd-bank{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);white-space:nowrap;}
.btd-char{font-family:'Cinzel',serif;font-size:10px;color:var(--text);}
.btd-reags{display:flex;gap:5px;flex-wrap:wrap;}
.btd-reag{display:flex;align-items:center;gap:3px;font-family:'Cinzel',serif;font-size:9px;
  padding:2px 7px;border-radius:10px;border:1px solid rgba(201,168,76,.2);color:var(--gold);
  background:rgba(201,168,76,.06);}
.btd-items{display:flex;flex-direction:column;gap:2px;}
.btd-item{font-size:11px;color:var(--text-dim);}
.btd-item::before{content:'· ';}
.bank-empty{font-size:12px;color:var(--text-dim);font-style:italic;padding:16px 0;text-align:center;}
.bank-reload-btn{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:1.5px;
  padding:5px 14px;border-radius:5px;border:1px solid var(--line);color:var(--text-dim);
  background:none;cursor:pointer;transition:all .2s;margin-left:auto;}
.bank-reload-btn:hover{border-color:var(--gold-d);color:var(--gold);}
.banks-header-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.banks-loading{font-size:11px;color:var(--text-dim);font-style:italic;padding:16px 0;text-align:center;}
/* ── PARTY / GRANT ── */
.admin-select,.admin-input,.admin-textarea{
  background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--text);
  font-family:'Crimson Pro',Georgia,serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color .2s;
}
.admin-select:focus,.admin-input:focus,.admin-textarea:focus{border-color:var(--accent2);}
.admin-select{flex:1;min-width:180px;}
.admin-input{flex:1;min-width:120px;}
.admin-input-num{flex:0 0 70px;min-width:60px;text-align:center;}
.admin-textarea{width:100%;margin-top:8px;min-height:44px;resize:vertical;font-size:12px;}
.party-admin-add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.party-admin-chips{display:flex;flex-wrap:wrap;gap:8px;}
.party-admin-chip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--accent);
  border-radius:20px;padding:6px 8px 6px 14px;font-size:12px;color:var(--text);}
.party-admin-chip button{background:none;border:1px solid rgba(224,92,92,.4);color:var(--life);border-radius:50%;
  width:20px;height:20px;line-height:1;cursor:pointer;font-size:11px;transition:all .15s;flex-shrink:0;}
.party-admin-chip button:hover{background:rgba(224,92,92,.2);}
.grant-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:6px;}
.grant-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:var(--text-dim);flex-shrink:0;}
.grant-block{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:14px;}
.grant-block-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--gold-l);margin-bottom:10px;}
.grant-reag-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.grant-reag-lbl{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-mid);}
@media(max-width:580px){.admin-select,.admin-input{min-width:100%;}.grant-reag-row{flex-direction:column;align-items:stretch;}}
</style>
</head>
<body>
<div class="sheet">

<div class="header">
  <a href="index.html" class="back-link">← Меню</a>
  <div class="header-deco"></div>
  <h1>АДМИНИСТРАТОР</h1>
  <div class="header-sub">Управление ареной &nbsp;•&nbsp; Фройский Маг</div>
  <div class="live-badge offline" id="live-badge"><div class="live-dot"></div><span id="live-text">OFFLINE</span></div>
</div>

<div class="stats-bar">
  <div class="stat-chip"><div class="stat-chip-label">СТАТУС АРЕНЫ</div><div class="stat-chip-val" id="stat-status">—</div></div>
  <div class="stat-chip"><div class="stat-chip-label">БОЙЦОВ</div><div class="stat-chip-val" id="stat-fighters">—</div></div>
  <div class="stat-chip"><div class="stat-chip-label">ОБНОВЛЕНО</div><div class="stat-chip-val" id="stat-updated" style="font-size:13px;padding-top:3px;">—</div></div>
</div>

<div class="section-title">ТЕКУЩАЯ АРЕНА</div>
<div id="arena-container"><div class="empty-state"><div class="empty-icon">⚔</div><div class="empty-text">Подключение…</div></div></div>

<div class="log-panel">
  <div class="section-title">ЖУРНАЛ ДЕЙСТВИЙ</div>
  <div class="log-list" id="log-list"><div class="log-empty">Действий пока не было</div></div>
</div>

<!-- ── BANKS ── -->
<div class="banks-panel">
  <div class="banks-header-row">
    <div class="section-title" style="margin-bottom:0;flex:1;">БАНКИ</div>
    <button class="bank-reload-btn" onclick="loadBanks()">⟳ Обновить</button>
  </div>
  <div id="banks-body"><div class="banks-loading">⟳ Загрузка…</div></div>
</div>

<!-- ── PARTY ── -->
<div class="banks-panel">
  <div class="banks-header-row">
    <div class="section-title" style="margin-bottom:0;flex:1;">ПАТИ</div>
    <button class="bank-reload-btn" onclick="loadPartyAdmin()">⟳ Обновить</button>
  </div>
  <div class="party-admin-add-row">
    <select id="party-add-select" class="admin-select"><option value="">— загрузка персонажей —</option></select>
    <button class="abtn abtn-declare" onclick="addToParty()">+ Добавить в пати</button>
  </div>
  <div id="party-admin-body"><div class="banks-loading">⟳ Загрузка…</div></div>
</div>

<!-- ── GRANT ITEMS / REAGENTS ── -->
<div class="banks-panel">
  <div class="section-title">ВЫДАЧА ПРЕДМЕТОВ И РЕАГЕНТОВ</div>
  <div class="grant-row">
    <span class="grant-label">ПЕРСОНАЖ</span>
    <select id="grant-char-select" class="admin-select"><option value="">— загрузка персонажей —</option></select>
  </div>

  <div class="grant-block">
    <div class="grant-block-title">🎁 ПРЕДМЕТ</div>
    <div class="grant-row">
      <input id="grant-item-name" class="admin-input" type="text" placeholder="Название предмета">
      <input id="grant-item-qty" class="admin-input admin-input-num" type="number" min="1" value="1">
      <button class="abtn abtn-declare" onclick="grantItemFromAdmin()">Выдать предмет</button>
    </div>
  </div>

  <div class="grant-block">
    <div class="grant-block-title">⚗ РЕАГЕНТЫ</div>
    <div class="grant-reag-row">
      <label class="grant-reag-lbl">🔴 <input id="grant-reag-red" class="admin-input admin-input-num" type="number" value="0"></label>
      <label class="grant-reag-lbl">🔵 <input id="grant-reag-blue" class="admin-input admin-input-num" type="number" value="0"></label>
      <label class="grant-reag-lbl">🟢 <input id="grant-reag-green" class="admin-input admin-input-num" type="number" value="0"></label>
      <label class="grant-reag-lbl">🟡 <input id="grant-reag-yellow" class="admin-input admin-input-num" type="number" value="0"></label>
      <button class="abtn abtn-declare" onclick="grantReagentsFromAdmin()">Выдать реагенты</button>
    </div>
  </div>
</div>

</div>

<div id="confirm-overlay">
  <div class="confirm-modal">
    <div class="confirm-icon">⚠</div>
    <div class="confirm-title" id="ctitle">ПОДТВЕРДИТЕ</div>
    <div class="confirm-body" id="cbody">Вы уверены?</div>
    <div class="confirm-actions">
      <button class="confirm-btn cyes" id="cyes">Да, выполнить</button>
      <button class="confirm-btn cno" onclick="closeConfirm()">Отмена</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="config.js"></script>
<script>
const FB=(typeof FIREBASE_CONFIG!=='undefined'&&FIREBASE_CONFIG?.databaseURL)?FIREBASE_CONFIG.databaseURL:null;
const ARENA_PATH='/arena/current';
const POLL_MS=2000;
const ADJ_COLORS={natisk:'#c9a84c',obman:'#e8934c',pokoj:'#9b7fe8',istsel:'#7ecba1',gospod:'#e05c5c',stoikost:'#6ab0f5'};
const ADJ_NAMES={natisk:'Натиск',obman:'Обман',pokoj:'Покой',istsel:'Исцеление',gospod:'Господство',stoikost:'Стойкость'};

let arenaEs=null,pollTimer=null,lastState=null,confirmCb=null;

const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setLive(on){const b=$('live-badge'),tx=$('live-text');if(on){b.classList.remove('offline');tx.textContent='LIVE';}else{b.classList.add('offline');tx.textContent='OFFLINE';}}

function toast(msg,dur=3000){const t=$('toast');t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},dur);}

function addLog(msg,type='ok'){
  const list=$('log-list');
  const empty=list.querySelector('.log-empty');if(empty)empty.remove();
  const time=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const el=document.createElement('div');el.className='log-entry '+type;
  el.innerHTML='<span class="log-time">'+time+'</span><span>'+esc(msg)+'</span>';
  list.prepend(el);
  [...list.querySelectorAll('.log-entry')].slice(60).forEach(e=>e.remove());
}

function openConfirm(title,body,onYes){$('ctitle').textContent=title;$('cbody').textContent=body;confirmCb=onYes;$('confirm-overlay').classList.add('show');}
function closeConfirm(){$('confirm-overlay').classList.remove('show');confirmCb=null;}
$('cyes').onclick=()=>{closeConfirm();if(confirmCb)confirmCb();};

async function fbFetch(p){const r=await fetch(FB+p+'.json');if(!r.ok)throw new Error(r.status);return r.json();}
async function fbPatch(p,d){const r=await fetch(FB+p+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error(r.status);return r.json();}
async function fbDelete(p){const r=await fetch(FB+p+'.json',{method:'DELETE'});if(!r.ok)throw new Error(r.status);}
async function fbSet(p,d){const r=await fetch(FB+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error(r.status);return r.json();}

async function cancelFight(){
  const s=lastState;if(!s||s.status==='done')return;
  const a=s.fighters?.a?.charName||'—',b=s.fighters?.b?.charName||'—';
  openConfirm('ОТМЕНИТЬ БОЙ','Завершить бой «'+a+'» vs «'+b+'» без победителя? ММР не изменится. Используй при софтлоке.',async()=>{
    try{await fbPatch(ARENA_PATH,{status:'done',winner:null,mmrDelta:{a:0,b:0}});addLog('Бой отменён: '+a+' vs '+b,'warn');toast('Бой отменён');}
    catch(e){addLog('Ошибка отмены: '+e.message,'err');toast('Ошибка: '+e.message);}
  });
}

async function declareWinner(side){
  const s=lastState;if(!s||s.status!=='fight')return;
  const win=s.fighters?.[side],lose=s.fighters?.[side==='a'?'b':'a'];if(!win)return;
  const wn=win.charName||'Fighter '+side.toUpperCase(),ln=lose?.charName||'—';
  const W=25,L=-20;
  openConfirm('ПОБЕДИТЕЛЬ ВРУЧНУЮ','Засчитать победу «'+wn+'» над «'+ln+'»? ММР: '+wn+' +'+W+', '+ln+' '+L+'.',async()=>{
    try{
      const delta={a:side==='a'?W:L,b:side==='b'?W:L};
      await fbPatch(ARENA_PATH,{status:'done',winner:side,mmrDelta:delta});
      addLog('Победитель вручную: '+wn+' над '+ln,'ok');toast('Победа засчитана: '+wn);
    }catch(e){addLog('Ошибка: '+e.message,'err');toast('Ошибка: '+e.message);}
  });
}

async function clearArena(){
  openConfirm('СБРОСИТЬ АРЕНУ','Полностью удалить текущую арену из базы данных? Следующий игрок создаст её заново.',async()=>{
    try{await fbDelete(ARENA_PATH);addLog('Арена полностью сброшена','warn');toast('Арена сброшена');}
    catch(e){addLog('Ошибка сброса: '+e.message,'err');toast('Ошибка: '+e.message);}
  });
}

function render(state){
  lastState=state;
  const now=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  $('stat-updated').textContent=now;
  if(!state){$('stat-status').textContent='ПУСТО';$('stat-fighters').textContent='0';renderEmpty();return;}
  const status=state.status||'empty',fighters=state.fighters||{};
  const fc=[fighters.a,fighters.b].filter(Boolean).length;
  const sl={waiting:'ОЖИДАНИЕ',fight:'БОЙ',done:'ЗАВЕРШЁН'};
  $('stat-status').textContent=sl[status]||status.toUpperCase();
  $('stat-fighters').textContent=String(fc);
  const c=$('arena-container');c.innerHTML='';
  const card=document.createElement('div');card.className='arena-card status-'+status;
  card.innerHTML=buildCard(state,status,fighters);c.appendChild(card);
}

function buildCard(state,status,fighters){
  const sl={waiting:'ОЖИДАНИЕ',fight:'БОЙ ИДЁТ',done:'ЗАВЕРШЁН'};
  const pill='<span class="status-pill '+status+'"><span class="status-dot '+status+'"></span>'+esc(sl[status]||status)+'</span>';
  let wb='';
  if(status==='done'){
    if(state.winner){const wn=esc(fighters[state.winner]?.charName||'Победитель');wb='<span style="font-family:\'Cinzel\',serif;font-size:9px;letter-spacing:1.5px;color:var(--green);border:1px solid rgba(76,187,138,.3);padding:3px 10px;border-radius:10px;background:rgba(76,187,138,.06);">🏆 '+wn+'</span>';}
    else if(state.winner===null){wb='<span style="font-family:\'Cinzel\',serif;font-size:9px;letter-spacing:1.5px;color:var(--orange);border:1px solid rgba(232,147,76,.3);padding:3px 10px;border-radius:10px;background:rgba(232,147,76,.06);">⚠ Отменён</span>';}
  }
  const header='<div class="arena-card-header"><span class="arena-path">⚔ arena / current</span>'+wb+pill+'</div>';
  const fA=buildFighter(fighters.a,'a',state),fB=buildFighter(fighters.b,'b',state);
  const grid='<div class="fighters-grid">'+fA+'<div class="vs-mini">VS</div>'+fB+'</div>';
  const isFight=status==='fight',isActive=status==='waiting'||status==='fight',canDecl=isFight&&fighters.a&&fighters.b;
  let acts='';
  if(canDecl){
    const nA=esc(fighters.a?.charName||'A'),nB=esc(fighters.b?.charName||'B');
    acts+='<button class="abtn abtn-declare" onclick="declareWinner(\'a\')">🏆 '+nA+'</button>';
    acts+='<button class="abtn abtn-declare" onclick="declareWinner(\'b\')">🏆 '+nB+'</button>';
  }
  if(isActive) acts+='<button class="abtn abtn-cancel" onclick="cancelFight()">✕ Отменить бой</button>';
  acts+='<button class="abtn abtn-clear" onclick="clearArena()">🗑 Сбросить</button>';
  acts+='<a class="abtn abtn-open" href="arena.html" target="_blank">→ Арена</a>';
  const mt={waiting:'Ожидание второго бойца…',fight:'Бой в процессе',done:state.winner?'Победитель: '+esc(fighters[state.winner]?.charName||'—'):'Бой завершён без победителя'}[status]||'';
  const footer='<div class="card-footer"><div class="card-meta">'+mt+'</div><div class="card-actions">'+acts+'</div></div>';
  return header+grid+footer;
}

function buildFighter(f,side,state){
  if(!f)return '<div class="fighter-mini empty-slot">Слот '+side.toUpperCase()+' свободен</div>';
  const bMax=f.barrierMax||0,bCur=f.barrierCur??0,lMax=f.lifeMax||0,lCur=f.lifeCur??0;
  const bP=bMax>0?Math.max(0,Math.min(100,bCur/bMax*100)):0;
  const lP=lMax>0?Math.max(0,Math.min(100,lCur/lMax*100)):0;
  const adjs=f.adjActive||[];
  const tags=adjs.map(id=>{const c=ADJ_COLORS[id]||'#c9a84c';return '<span style="font-family:\'Cinzel\',serif;font-size:7px;padding:1px 5px;border-radius:6px;border:1px solid '+c+'44;color:'+c+';background:'+c+'0d;">'+esc(ADJ_NAMES[id]||id)+'</span>';}).join('');
  let cls='fighter-mini';
  if(state.status==='done'&&state.winner) cls+=state.winner===side?' winner-hl':' loser-dim';
  return '<div class="'+cls+'">'
    +'<div class="fm-name">'+esc(f.charName||'Безымянный')+'</div>'
    +'<div class="fm-player">'+esc(f.playerName||'—')+'</div>'
    +'<div class="fm-hp">'
      +'<div class="fm-bar-row"><span class="fm-lbl b">⬡</span><div class="fm-bg"><div class="fm-bar b" style="width:'+bP+'%"></div></div><span class="fm-num b">'+bCur+' / '+bMax+'</span></div>'
      +'<div class="fm-bar-row"><span class="fm-lbl l">♥</span><div class="fm-bg"><div class="fm-bar l" style="width:'+lP+'%"></div></div><span class="fm-num l">'+lCur+' / '+lMax+'</span></div>'
    +'</div>'
    +(tags?'<div class="fm-build">'+tags+'</div>':'')
    +(f.mmr?'<div class="fm-mmr">ММР '+f.mmr+'</div>':'')
    +'</div>';
}

function renderEmpty(){
  $('arena-container').innerHTML='<div class="empty-state"><div class="empty-icon">⚔</div><div class="empty-text">Арена свободна — нет активных боёв</div></div>'
    +'<div style="display:flex;justify-content:center;margin-top:12px;gap:8px;">'
    +'<button class="abtn abtn-clear" style="opacity:.55;" onclick="clearArena()">🗑 Принудительный сброс</button>'
    +'<a class="abtn abtn-open" href="arena.html" target="_blank">→ Открыть арену</a>'
    +'</div>';
}

function startSync(){
  stopSync();if(!FB)return;
  arenaEs=new EventSource(FB+ARENA_PATH+'.json');
  arenaEs.addEventListener('put',e=>{try{const m=JSON.parse(e.data);setLive(true);if(m.path==='/')render(m.data);else fetchAndRender();}catch{}});
  arenaEs.addEventListener('patch',()=>fetchAndRender());
  arenaEs.onerror=()=>setLive(false);
  pollTimer=setInterval(fetchAndRender,POLL_MS);
  fetchAndRender();
}
function stopSync(){if(arenaEs){arenaEs.close();arenaEs=null;}if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

async function fetchAndRender(){
  if(!FB)return;
  try{const d=await fbFetch(ARENA_PATH);setLive(true);render(d);}
  catch{setLive(false);}
}

// ── BANKS ────────────────────────────────────────────────────────────────
const REAG_ICON_ADM = {red:'🔴',blue:'🔵',green:'🟢',yellow:'🟡'};

async function loadBanks(){
  if(!FB)return;
  const body=$('banks-body');
  body.innerHTML='<div class="banks-loading">⟳ Загрузка банков…</div>';
  try{
    // Get all bank data from Firebase /bank/
    const allBanks=await fbFetch('/bank').catch(()=>null);
    if(!allBanks||typeof allBanks!=='object'){
      body.innerHTML='<div class="bank-empty">Нет данных о банках в Firebase</div>';
      return;
    }

    // Collect all char names from /chars/ for display
    const charNames={};
    try{
      const allChars=await fbFetch('/chars');
      if(allChars) Object.entries(allChars).forEach(([uuid,c])=>{charNames[uuid]=c.charName||uuid;});
    }catch{}

    // Build flat list: {bankName, charUuid, charName, reagents, items}
    const rows=[];
    Object.entries(allBanks).forEach(([bankKey,bankData])=>{
      if(!bankData||typeof bankData!=='object')return;
      Object.entries(bankData).forEach(([charUuid,store])=>{
        if(!store||typeof store!=='object')return;
        const reags=store.reagents||{};
        const items=store.items||[];
        const hasReags=Object.values(reags).some(v=>v>0);
        const hasItems=items.length>0;
        if(!hasReags&&!hasItems)return; // skip empty
        rows.push({
          bankName: decodeURIComponent(bankKey),
          charUuid, charName: charNames[charUuid]||charUuid,
          reagents: reags, items,
        });
      });
    });

    if(!rows.length){
      body.innerHTML='<div class="bank-empty">Все банки пусты</div>';
      return;
    }

    // Sort by bank name then char name
    rows.sort((a,b)=>a.bankName.localeCompare(b.bankName)||a.charName.localeCompare(b.charName));

    // Render table
    let html='<div class="bank-table-wrap"><table class="bank-table">'
      +'<thead><tr><th>БАНК</th><th>ПЕРСОНАЖ</th><th>РЕАГЕНТЫ</th><th>ПРЕДМЕТЫ</th></tr></thead><tbody>';

    let prevBank='';
    rows.forEach(r=>{
      const bankCell = r.bankName!==prevBank
        ? `<td class="btd-bank" rowspan="1">🏛 ${esc(r.bankName)}</td>` // rowspan simplified
        : `<td class="btd-bank">🏛 ${esc(r.bankName)}</td>`;
      prevBank=r.bankName;

      const reagHtml=Object.entries(r.reagents)
        .filter(([,v])=>v>0)
        .map(([c,v])=>`<span class="btd-reag">${REAG_ICON_ADM[c]||c} ×${v}</span>`)
        .join('');

      const itemsHtml=r.items
        .map(i=>`<div class="btd-item">${esc(i.name)}${i.desc?` <span style="color:var(--text-dim);font-size:10px;font-style:italic;">— ${esc(i.desc)}</span>`:''}`)
        .join('');

      html+=`<tr>
        <td class="btd-bank">🏛 ${esc(r.bankName)}</td>
        <td class="btd-char">${esc(r.charName)}</td>
        <td>${reagHtml?`<div class="btd-reags">${reagHtml}</div>`:'<span style="color:var(--text-dim);font-size:10px;">—</span>'}</td>
        <td>${itemsHtml?`<div class="btd-items">${itemsHtml}</div>`:'<span style="color:var(--text-dim);font-size:10px;">—</span>'}</td>
      </tr>`;
    });

    html+='</tbody></table></div>';
    body.innerHTML=html;
  }catch(e){
    body.innerHTML=`<div class="bank-empty">Ошибка загрузки банков: ${esc(e.message)}</div>`;
    addLog('Ошибка загрузки банков: '+e.message,'err');
  }
}

// ── CHARACTERS CACHE (used by party + grant selects) ───────────────────────
let charsCache=null;
async function loadCharsCache(force){
  if(charsCache&&!force)return charsCache;
  try{charsCache=await fbFetch('/chars')||{};}catch{charsCache={};}
  return charsCache;
}
function charLabelAdm(uuid,c){
  const nm=c?.charName||uuid;
  const pl=c?.playerName?' — '+c.playerName:'';
  return nm+pl;
}
async function populateCharSelects(){
  const chars=await loadCharsCache(true);
  const entries=Object.entries(chars).sort((a,b)=>charLabelAdm(a[0],a[1]).localeCompare(charLabelAdm(b[0],b[1])));
  const opts='<option value="">— выберите персонажа —</option>'
    +entries.map(([uuid,c])=>`<option value="${uuid}">${esc(charLabelAdm(uuid,c))}</option>`).join('');
  ['party-add-select','grant-char-select'].forEach(id=>{
    const el=$(id);if(!el)return;
    const prev=el.value;
    el.innerHTML=opts;
    if([...el.options].some(o=>o.value===prev))el.value=prev;
  });
}

// ── PARTY ADMIN ──────────────────────────────────────────────────────────
async function loadPartyAdmin(){
  const body=$('party-admin-body');
  body.innerHTML='<div class="banks-loading">⟳ Загрузка…</div>';
  try{
    await populateCharSelects();
    const partyData=await fbFetch('/party').catch(()=>null);
    const chars=charsCache||{};
    const uuids=(partyData&&typeof partyData==='object')?Object.keys(partyData).filter(k=>partyData[k]===true):[];
    if(!uuids.length){body.innerHTML='<div class="bank-empty">В пати сейчас никого нет</div>';return;}
    body.innerHTML='<div class="party-admin-chips">'+uuids.map(uuid=>{
      const label=esc(charLabelAdm(uuid,chars[uuid]));
      return `<div class="party-admin-chip"><span>${label}</span><button onclick="removeFromParty('${uuid}')" title="Убрать из пати">✕</button></div>`;
    }).join('')+'</div>';
  }catch(e){
    body.innerHTML=`<div class="bank-empty">Ошибка загрузки пати: ${esc(e.message)}</div>`;
    addLog('Ошибка загрузки пати: '+e.message,'err');
  }
}

async function addToParty(){
  const sel=$('party-add-select');const uuid=sel.value;
  if(!uuid){toast('Выберите персонажа');return;}
  try{
    await fbPatch('/party',{[uuid]:true});
    addLog('Добавлен в пати: '+charLabelAdm(uuid,(charsCache||{})[uuid]),'ok');
    toast('Добавлен в пати');
    loadPartyAdmin();
  }catch(e){addLog('Ошибка добавления в пати: '+e.message,'err');toast('Ошибка: '+e.message);}
}

async function removeFromParty(uuid){
  try{
    await fbDelete('/party/'+uuid);
    addLog('Убран из пати: '+charLabelAdm(uuid,(charsCache||{})[uuid]),'warn');
    toast('Убран из пати');
    loadPartyAdmin();
  }catch(e){addLog('Ошибка удаления из пати: '+e.message,'err');toast('Ошибка: '+e.message);}
}

// ── GRANT ITEMS / REAGENTS ───────────────────────────────────────────────
// Пишем в /logs — тот же формат, что уже слушает клиент (firebase.js: pollLogs/processLogEntry)
function genLogKeyAdm(){return 'log_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);}

async function grantItemFromAdmin(){
  const uuid=$('grant-char-select').value;
  const name=$('grant-item-name').value.trim();
  const qty=parseInt($('grant-item-qty').value)||1;
  if(!uuid){toast('Выберите персонажа');return;}
  if(!name){toast('Введите название предмета');return;}
  try{
    await fbSet('/logs/'+genLogKeyAdm(),{uuid,type:'item',payload:name+'|'+qty,confirmed:true,ts:Date.now(),source:'admin'});
    addLog('Выдан предмет «'+name+(qty>1?' ×'+qty:'')+'» — '+charLabelAdm(uuid,(charsCache||{})[uuid]),'ok');
    toast('Предмет выдан');
    $('grant-item-name').value='';$('grant-item-qty').value='1';
  }catch(e){addLog('Ошибка выдачи предмета: '+e.message,'err');toast('Ошибка: '+e.message);}
}

async function grantReagentsFromAdmin(){
  const uuid=$('grant-char-select').value;
  if(!uuid){toast('Выберите персонажа');return;}
  const vals={
    red:parseInt($('grant-reag-red').value)||0,
    blue:parseInt($('grant-reag-blue').value)||0,
    green:parseInt($('grant-reag-green').value)||0,
    yellow:parseInt($('grant-reag-yellow').value)||0,
  };
  const payload=Object.entries(vals).filter(([,v])=>v!==0).map(([c,v])=>c+':'+v).join(',');
  if(!payload){toast('Укажите хотя бы одно ненулевое значение');return;}
  try{
    await fbSet('/logs/'+genLogKeyAdm(),{uuid,type:'reagent',payload,confirmed:true,ts:Date.now(),source:'admin'});
    addLog('Выданы реагенты ('+payload+') — '+charLabelAdm(uuid,(charsCache||{})[uuid]),'ok');
    toast('Реагенты выданы');
    ['red','blue','green','yellow'].forEach(k=>$('grant-reag-'+k).value='0');
  }catch(e){addLog('Ошибка выдачи реагентов: '+e.message,'err');toast('Ошибка: '+e.message);}
}

(function(){
  if(!FB){
    $('arena-container').innerHTML='<div class="empty-state"><div class="empty-icon">⚠</div><div class="empty-text">Firebase не настроен — проверьте config.js</div></div>';
    addLog('Firebase не найден','err');return;
  }
  addLog('Подключение к Firebase…','ok');
  startSync();
  loadBanks();
  loadPartyAdmin();
})();
