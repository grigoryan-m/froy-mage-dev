<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Персонажи — Фройские Маги</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b5ea7">
<style>
:root{--bg:#080812;--panel:#0e0e1f;--panel2:#131328;--panel3:#1a1a35;--accent:#7b5ea7;--accent2:#a67fd1;--gold:#c9a84c;--gold-l:#e8c96e;--gold-d:#8a6a20;--text:#e8e0f0;--text-dim:#7a6f90;--text-mid:#b0a0c8;--life:#e05c5c;--barrier:#5b8dee;--line:#2a1f45;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;padding:24px 16px 60px;background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(123,94,167,.08) 0%,transparent 70%);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.15) 0%,transparent 100%),radial-gradient(1px 1px at 70% 10%,rgba(255,255,255,.12) 0%,transparent 100%),radial-gradient(1px 1px at 40% 60%,rgba(255,255,255,.08) 0%,transparent 100%),radial-gradient(1px 1px at 85% 40%,rgba(255,255,255,.10) 0%,transparent 100%);}
.wrap{position:relative;max-width:860px;margin:0 auto;z-index:1;}

/* HEADER */
.header{text-align:center;padding:28px 20px 22px;border:1px solid var(--accent);border-radius:10px;background:var(--panel);margin-bottom:28px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(123,94,167,.1) 0%,transparent 70%);}
.header-deco{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.header h1{font-family:'Cinzel',serif;font-size:20px;font-weight:700;letter-spacing:5px;color:var(--gold-l);text-shadow:0 0 30px rgba(201,168,76,.4);position:relative;}
.header-sub{font-size:11px;color:var(--accent2);letter-spacing:3px;margin-top:5px;font-style:italic;position:relative;}
.back-link{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-decoration:none;border:1px solid var(--line);padding:6px 12px;border-radius:5px;transition:all .2s;z-index:1;}
.back-link:hover{color:var(--gold);border-color:var(--gold-d);}

/* ACTIONS BAR */
.actions-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px;}
.btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;padding:10px 22px;border-radius:6px;cursor:pointer;transition:all .2s;border:1px solid;}
.btn-new{border-color:var(--accent);color:var(--accent2);background:rgba(123,94,167,.12);}
.btn-new:hover{background:rgba(123,94,167,.25);color:var(--text);}
.btn-import{border-color:var(--gold-d);color:var(--gold);background:rgba(201,168,76,.06);}
.btn-import:hover{background:rgba(201,168,76,.14);}
.chars-count{margin-left:auto;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-dim);}
.chars-count span{color:var(--gold-l);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
.empty-state .empty-icon{font-size:40px;margin-bottom:16px;opacity:.4;}
.empty-state p{font-size:14px;font-style:italic;margin-bottom:20px;}

/* CHAR CARDS GRID */
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;overflow:visible;}

/* CHAR CARD */
.char-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;transition:border-color .2s,transform .15s;cursor:pointer;text-decoration:none;display:block;}
.char-card:hover{border-color:var(--accent);transform:translateY(-2px);z-index:10;position:relative;}
.char-card-header{padding:14px 16px 10px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,rgba(123,94,167,.06),transparent);}
.char-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.char-player{font-size:11px;color:var(--text-dim);font-style:italic;}
.char-card-body{padding:12px 16px;}
.char-stats{display:flex;gap:12px;margin-bottom:10px;}
.char-stat{flex:1;background:var(--panel2);border-radius:6px;padding:7px 10px;border:1px solid var(--line);}
.char-stat-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:3px;}
.char-stat-val{font-family:'Cinzel',serif;font-size:13px;font-weight:700;}
.char-stat-val.barrier{color:var(--barrier);}
.char-stat-val.life{color:var(--life);}
.char-build{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--panel2);border-radius:6px;border:1px solid var(--line);}
.char-build-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1.5px;color:var(--text-dim);flex-shrink:0;}
.char-build-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold-l);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.char-build-none{font-size:11px;color:var(--text-dim);font-style:italic;}
.char-card-footer{padding:8px 16px 10px;display:flex;justify-content:space-between;align-items:center;}
.char-date{font-size:10px;color:var(--text-dim);font-style:italic;}
.char-actions{display:flex;gap:6px;}
.char-btn{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:1px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s;border:1px solid;background:none;}
.char-btn-open{border-color:var(--accent);color:var(--accent2);}
.char-btn-open:hover{background:rgba(123,94,167,.15);}
.char-btn-export{border-color:var(--line);color:var(--text-dim);}
.char-btn-export:hover{border-color:var(--gold-d);color:var(--gold);}
.char-btn-delete{border-color:var(--line);color:var(--text-dim);}
.char-btn-delete:hover{border-color:var(--life);color:var(--life);}
.char-mmr-badge{
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;
  padding:3px 9px;border-radius:8px;border:1px solid;
  white-space:nowrap;position:relative;cursor:default;
}
.char-mmr-badge:hover .rank-tooltip{opacity:1;transform:translateX(-50%) translateY(0);}
.rank-tooltip{
  position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%) translateY(5px);
  background:var(--panel3);border:1px solid;border-radius:8px;
  padding:10px 16px;white-space:nowrap;z-index:99;
  opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 8px 28px rgba(0,0,0,.65);
}
.rank-tooltip::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--panel3);
}
.rank-icon{font-size:18px;margin-bottom:3px;}
.rank-name{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:2px;}
.rank-division{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;opacity:.65;margin-top:1px;}
.rank-range{font-family:'Crimson Pro',serif;font-size:10px;opacity:.45;margin-top:3px;font-style:italic;}
.avg-mmr-bar{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.avg-mmr-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:var(--text-dim);}
.avg-mmr-val{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold-l);}

/* BRANCH TAGS */
.char-branches{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.char-branch-tag{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1px;padding:2px 7px;border-radius:10px;border:1px solid;}

@media(max-width:500px){.chars-grid{grid-template-columns:1fr;}.actions-bar{flex-direction:column;align-items:stretch;}.chars-count{margin-left:0;}}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <a class="back-link" href="index.html">← Меню</a>
  <div class="header-deco"></div>
  <h1>ПЕРСОНАЖИ</h1>
  <div class="header-sub">Фройские Маги &nbsp;•&nbsp; Том II</div>
</div>

<div class="actions-bar">
  <button class="btn btn-new" onclick="createNew()">+ Новый персонаж</button>
  <button class="btn btn-import" onclick="document.getElementById('import-input').click()">⬆ Загрузить JSON</button>
  <input type="file" id="import-input" accept=".json" style="display:none" onchange="importChar(event)">
  <div class="chars-count">Персонажей: <span id="count">0</span></div>
</div>

<div class="avg-mmr-bar" id="avg-mmr-bar" style="display:none;">
  <div class="avg-mmr-label">СРЕДНИЙ MMR</div>
  <div class="avg-mmr-val" id="avg-mmr-val">—</div>
  <div style="flex:1;height:1px;background:linear-gradient(90deg,var(--gold-d),transparent);opacity:.4;"></div>
</div>

<div id="chars-container"></div>

</div>

<script src="config.js"></script>
<script>
const CHAR_INDEX_KEY = 'froyskyy_chars_index';
const CHAR_PREFIX    = 'froyskyy_char_';
const DEFAULT_MMR    = 1000;

// ── RANK SYSTEM ───────────────────────────────────────────────────────────────
// Divisions: III → II → I (low to high within a tier)
const RANKS = [
  // mmr threshold (floor), name, divisions, icon, color, bg, border
  { min:    0, max:  799, name:'Железо',     divs:['III','II','I'], icon:'⛓',  color:'#8a7a6a', bg:'rgba(138,122,106,.10)', border:'#8a7a6a44' },
  { min:  800, max:  999, name:'Бронза',     divs:['III','II','I'], icon:'🥉',  color:'#b87333', bg:'rgba(184,115,51,.10)',  border:'#b8733344' },
  { min: 1000, max: 1099, name:'Серебро',    divs:['III','II','I'], icon:'🥈',  color:'#a0aab4', bg:'rgba(160,170,180,.10)', border:'#a0aab444' },
  { min: 1100, max: 1249, name:'Золото',     divs:['III','II','I'], icon:'🥇',  color:'#c9a84c', bg:'rgba(201,168,76,.10)',  border:'#c9a84c55' },
  { min: 1250, max: 1399, name:'Платина',    divs:['III','II','I'], icon:'💠',  color:'#5bc8c8', bg:'rgba(91,200,200,.10)',  border:'#5bc8c844' },
  { min: 1400, max: 1549, name:'Изумруд',    divs:['III','II','I'], icon:'💚',  color:'#4cbb8a', bg:'rgba(76,187,138,.10)',  border:'#4cbb8a44' },
  { min: 1550, max: 1699, name:'Бриллиант',  divs:['III','II','I'], icon:'💎',  color:'#6ab0f5', bg:'rgba(106,176,245,.10)', border:'#6ab0f555' },
  { min: 1700, max: 1849, name:'Мастер',     divs:['III','II','I'], icon:'👑',  color:'#a67fd1', bg:'rgba(166,127,209,.12)', border:'#a67fd155' },
  { min: 1850, max: 1999, name:'Грандмастер',divs:['II','I'],       icon:'🔮',  color:'#e8934c', bg:'rgba(232,147,76,.10)',  border:'#e8934c55' },
  { min: 2000, max: 2199, name:'Архимаг',    divs:['II','I'],       icon:'✦',   color:'#e05c5c', bg:'rgba(224,92,92,.12)',   border:'#e05c5c55' },
  { min: 2200, max: 2499, name:'Провидец',   divs:['I'],            icon:'🌟',  color:'#e8c96e', bg:'rgba(232,201,110,.13)', border:'#e8c96e66' },
  { min: 2500, max: Infinity, name:'Пророк', divs:[],               icon:'☀',   color:'#ffffff', bg:'rgba(255,255,255,.08)', border:'rgba(255,255,255,.35)' },
];

function getRank(mmr) {
  const tier = RANKS.find(r => mmr >= r.min && mmr <= r.max) || RANKS[0];
  let division = '';
  if (tier.divs.length > 0) {
    // Divide the tier range evenly among divisions (low div = high roman = worse)
    const span = tier.max === Infinity ? 300 : (tier.max - tier.min + 1);
    const divSpan = Math.ceil(span / tier.divs.length);
    const idx = Math.min(
      Math.floor((mmr - tier.min) / divSpan),
      tier.divs.length - 1
    );
    // idx 0 = lowest division = last in array (III), last idx = best (I)
    division = tier.divs[tier.divs.length - 1 - idx];
  }
  const rangeStr = tier.max === Infinity
    ? `${tier.min}+ ММР`
    : `${tier.min}–${tier.max} ММР`;
  return { ...tier, division, rangeStr };
}

const ADJ_COLORS = {
  natisk:'#c9a84c', obman:'#e8934c', pokoj:'#9b7fe8',
  istsel:'#7ecba1', gospod:'#e05c5c', stoikost:'#6ab0f5',
};
const ADJ_NAMES = {
  natisk:'НАТИСК', obman:'ОБМАН', pokoj:'ПОКОЙ',
  istsel:'ИСЦЕЛЕНИЕ', gospod:'ГОСПОДСТВО', stoikost:'СТОЙКОСТЬ',
};

async function getMMR(uuid) {
  if (!uuid) return DEFAULT_MMR;
  // 1. localStorage (saved by arena.html after each fight)
  const local = localStorage.getItem('arena_mmr_' + uuid);
  if (local !== null) {
    const v = parseInt(local);
    if (!isNaN(v)) return v;
  }
  // 2. Firebase fallback
  try {
    if (!FIREBASE_CONFIG?.databaseURL) return DEFAULT_MMR;
    const r = await fetch(`${FIREBASE_CONFIG.databaseURL}/mmr/${uuid}.json`);
    if (!r.ok) return DEFAULT_MMR;
    const v = await r.json();
    return (typeof v === 'number') ? v : DEFAULT_MMR;
  } catch { return DEFAULT_MMR; }
}

function getIndex() {
  try { return JSON.parse(localStorage.getItem(CHAR_INDEX_KEY)) || []; }
  catch(e) { return []; }
}
function saveIndex(idx) { localStorage.setItem(CHAR_INDEX_KEY, JSON.stringify(idx)); }
function getChar(id) {
  try { return JSON.parse(localStorage.getItem(CHAR_PREFIX + id)); }
  catch(e) { return null; }
}

function createNew() {
  const id = 'c' + Date.now();
  const idx = getIndex();
  idx.push({ id, name: 'Новый персонаж', savedAt: Date.now() });
  saveIndex(idx);
  localStorage.setItem(CHAR_PREFIX + id, JSON.stringify({ charName:'', playerName:'' }));
  location.href = 'character.html?id=' + id;
}

function importChar(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      const id = 'c' + Date.now();
      const name = data.charName || data.playerName || 'Импорт';
      const idx = getIndex();
      idx.push({ id, name, savedAt: Date.now() });
      saveIndex(idx);
      localStorage.setItem(CHAR_PREFIX + id, JSON.stringify(data));
      renderChars();
    } catch(err) { alert('Ошибка импорта: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function deleteChar(id, e) {
  e.stopPropagation(); e.preventDefault();
  const data = getChar(id);
  const name = data?.charName || 'этого персонажа';
  if(!confirm('Удалить ' + name + '? Это действие нельзя отменить.')) return;
  localStorage.removeItem(CHAR_PREFIX + id);
  const idx = getIndex().filter(c => c.id !== id);
  saveIndex(idx);
  renderChars();
}

function exportChar(id, e) {
  e.stopPropagation(); e.preventDefault();
  const data = getChar(id); if(!data) return;
  const name = (data.charName || 'character').replace(/\s+/g,'_');
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function renderChars() {
  const idx = getIndex();
  document.getElementById('count').textContent = idx.length;
  const container = document.getElementById('chars-container');

  if(!idx.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <p>Нет созданных персонажей.<br>Создай нового или загрузи JSON.</p>
      </div>`;
    document.getElementById('avg-mmr-bar').style.display = 'none';
    return;
  }

  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'chars-grid';

  // Fetch all MMRs in parallel
  const entries = idx.slice().reverse();
  const mmrValues = await Promise.all(entries.map(entry => {
    const data = getChar(entry.id) || {};
    return getMMR(data.charUUID || '');
  }));

  // Avg MMR — exclude chars with exactly DEFAULT_MMR (1000), they haven't fought
  const rankedMMRs = mmrValues.filter(v => typeof v === 'number' && v !== DEFAULT_MMR);
  const avgBar = document.getElementById('avg-mmr-bar');
  if (rankedMMRs.length) {
    const avg = Math.round(rankedMMRs.reduce((a,b) => a+b, 0) / rankedMMRs.length);
    const delta = avg - DEFAULT_MMR;
    const sign  = delta >= 0 ? '+' : '';
    const color = delta > 0 ? '#4cbb8a' : delta < 0 ? 'var(--life)' : 'var(--gold-l)';
    document.getElementById('avg-mmr-val').innerHTML =
      `<span style="color:${color}">${avg}</span>` +
      `<span style="font-family:'Crimson Pro',serif;font-size:11px;color:var(--text-dim);margin-left:8px;font-style:italic;">${sign}${delta} от базы &nbsp;·&nbsp; ${rankedMMRs.length}\u00a0перс${rankedMMRs.length===1?'онаж':'онажа'} в рейтинге</span>`;
    avgBar.style.display = '';
  } else {
    avgBar.style.display = 'none';
  }

  entries.forEach((entry, i) => {
    const data = getChar(entry.id) || {};
    const mmr  = mmrValues[i];
    const charName   = data.charName   || 'Безымянный';
    const playerName = data.playerName || '—';

    const barrierMax  = parseInt(data.barrierMax) || 0;
    const lifeMax     = parseInt(data.lifeMax)    || 0;
    const barrierFill = (data.hpFill?.['barrier-boxes']) || 0;
    const lifeFill    = (data.hpFill?.['life-boxes'])    || 0;
    const activeAdj   = Array.isArray(data.adjActive) ? data.adjActive : [];

    let mmrBadge = '';
    if (mmr !== DEFAULT_MMR) {
      const rank = getRank(mmr);
      const divLabel = rank.division ? `${rank.name} ${rank.division}` : rank.name;
      mmrBadge = `
        <span class="char-mmr-badge" style="color:${rank.color};background:${rank.bg};border-color:${rank.border};">
          MMR ${mmr}
          <span class="rank-tooltip" style="border-color:${rank.border};color:${rank.color};">
            <span class="rank-icon">${rank.icon}</span>
            <span class="rank-name" style="color:${rank.color};">${rank.name}</span>
            ${rank.division ? `<span class="rank-division">${rank.division} ДИВИЗИОН</span>` : ''}
            <span class="rank-range">${rank.rangeStr}</span>
          </span>
        </span>`;
    }

    let buildHtml = '';
    if(activeAdj.length === 2) {
      const [b1, b2] = activeAdj;
      const c1 = ADJ_COLORS[b1]||'#c9a84c', c2 = ADJ_COLORS[b2]||'#c9a84c';
      buildHtml = `<div class="char-build">
        <span class="char-build-label">БИЛД</span>
        <span class="char-build-name">
          <span style="color:${c1}">${ADJ_NAMES[b1]||b1}</span>
          <span style="color:var(--text-dim);margin:0 4px">+</span>
          <span style="color:${c2}">${ADJ_NAMES[b2]||b2}</span>
        </span>
      </div>`;
    } else {
      buildHtml = `<div class="char-build"><span class="char-build-label">БИЛД</span><span class="char-build-none">нет билда</span></div>`;
    }

    let branchTagsHtml = '';
    if(activeAdj.length) {
      branchTagsHtml = '<div class="char-branches">' +
        activeAdj.map(id => {
          const col = ADJ_COLORS[id]||'#c9a84c';
          return `<span class="char-branch-tag" style="color:${col};border-color:${col}44;background:${col}0d;">${ADJ_NAMES[id]||id}</span>`;
        }).join('') + '</div>';
    }

    const dateStr = entry.savedAt
      ? new Date(entry.savedAt).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})
      : '';
    const uuid = data.charUUID || '';
    const uuidShort = uuid ? uuid.substring(0,8)+'…' : '—';

    const card = document.createElement('a');
    card.className = 'char-card';
    card.href = 'character.html?id=' + entry.id;
    card.innerHTML = `
      <div class="char-card-header">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
          <div class="char-name" style="flex:1;">${escHtml(charName)}</div>
          ${mmrBadge}
        </div>
        <div class="char-player">Игрок: ${escHtml(playerName)}</div>
      </div>
      <div class="char-card-body">
        <div class="char-stats">
          <div class="char-stat">
            <div class="char-stat-label">БАРЬЕР</div>
            <div class="char-stat-val barrier">${barrierFill} / ${barrierMax}</div>
          </div>
          <div class="char-stat">
            <div class="char-stat-label">ЖИЗНЬ</div>
            <div class="char-stat-val life">${lifeFill} / ${lifeMax}</div>
          </div>
        </div>
        ${branchTagsHtml}
        ${buildHtml}
      </div>
      <div class="char-card-footer">
        <div>
          <span class="char-date">${dateStr}</span>
          ${uuid ? `<span style="font-family:monospace;font-size:9px;color:var(--text-dim);margin-left:8px;" title="${uuid}">UUID: ${uuidShort}</span>` : ''}
        </div>
        <div class="char-actions">
          <button class="char-btn char-btn-export" onclick="exportChar('${entry.id}',event)">⬇ JSON</button>
          <button class="char-btn char-btn-open"   onclick="location.href='character.html?id=${entry.id}'">Открыть →</button>
          <button class="char-btn char-btn-delete" onclick="deleteChar('${entry.id}',event)">Удалить</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  container.appendChild(grid);
}

function syncIndexNames() {
  const idx = getIndex();
  let changed = false;
  idx.forEach(entry => {
    const data = getChar(entry.id);
    const name = data?.charName || entry.name;
    if(name && name !== entry.name) { entry.name = name; changed = true; }
  });
  if(changed) saveIndex(idx);
}

syncIndexNames();
renderChars();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
