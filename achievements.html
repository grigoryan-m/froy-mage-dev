<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Достижения — Фройские Маги</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080812;--panel:#0e0e1f;--panel2:#131328;--panel3:#1a1a35;
  --accent:#7b5ea7;--accent2:#a67fd1;--gold:#c9a84c;--gold-l:#e8c96e;--gold-d:#8a6a20;
  --text:#e8e0f0;--text-dim:#7a6f90;--text-mid:#b0a0c8;--life:#e05c5c;--line:#2a1f45;
  /* rarity colours */
  --fun:#4cbb8a;       /* весёлая  — зелёная */
  --lore:#5b8dee;      /* лор      — синяя   */
  --secret:#9b59b6;    /* секретная — фиолетовая */
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;
  min-height:100vh;padding:24px 16px 80px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 10% 12%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 88%  8%,rgba(255,255,255,.14) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 70%,rgba(255,255,255,.10) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 55%,rgba(255,255,255,.12) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 28%,rgba(255,255,255,.08) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 86%,rgba(255,255,255,.09) 0%,transparent 100%),
    radial-gradient(1px 1px at 66% 20%,rgba(255,255,255,.11) 0%,transparent 100%),
    radial-gradient(ellipse 80% 55% at 50% 0%,rgba(123,94,167,.08) 0%,transparent 65%);}
.sheet{position:relative;max-width:900px;margin:0 auto;z-index:1;}

/* ── HEADER ── */
.header{text-align:center;padding:30px 20px 24px;border:1px solid var(--accent);
  border-radius:12px;background:var(--panel);margin-bottom:28px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(123,94,167,.11) 0%,transparent 70%);}
.header-deco{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:220px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.header h1{font-family:'Cinzel',serif;font-size:clamp(18px,5vw,26px);font-weight:700;
  letter-spacing:6px;color:var(--gold-l);text-shadow:0 0 30px rgba(201,168,76,.4);position:relative;}
.header-sub{font-size:12px;color:var(--accent2);letter-spacing:3px;margin-top:6px;
  font-style:italic;position:relative;}
.back-link{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-dim);
  text-decoration:none;border:1px solid var(--line);padding:6px 12px;border-radius:5px;
  transition:all .2s;z-index:1;}
.back-link:hover{color:var(--gold);border-color:var(--gold-d);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;
  padding:7px 16px;border-radius:20px;border:1px solid var(--line);
  background:none;color:var(--text-dim);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px;}
.filter-btn:hover{border-color:var(--accent2);color:var(--text);}
.filter-btn.active{background:rgba(123,94,167,.12);}
.filter-btn.active.all   {border-color:var(--accent2);color:var(--accent2);}
.filter-btn.active.fun   {border-color:var(--fun);   color:var(--fun);}
.filter-btn.active.lore  {border-color:var(--lore);  color:var(--lore);}
.filter-btn.active.secret{border-color:var(--secret);color:var(--secret);}
.filter-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stats-line{margin-left:auto;font-family:'Cinzel',serif;font-size:8px;
  letter-spacing:1.5px;color:var(--text-dim);}
.stats-line span{color:var(--gold-l);}

/* ── GRID ── */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}

/* ── CARD ── */
.ach-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;
  position:relative;}
.ach-card:hover{transform:translateY(-3px);}

/* rarity accents */
.ach-card.fun   {border-top:2px solid var(--fun);}
.ach-card.lore  {border-top:2px solid var(--lore);}
.ach-card.secret{border-top:2px solid var(--secret);}
.ach-card.fun:hover   {border-color:var(--fun);   box-shadow:0 8px 24px rgba(76,187,138,.15);}
.ach-card.lore:hover  {border-color:var(--lore);  box-shadow:0 8px 24px rgba(91,141,238,.15);}
.ach-card.secret:hover{border-color:var(--secret);box-shadow:0 8px 24px rgba(155,89,182,.2);}

/* secret shimmer overlay */
.ach-card.secret::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(125deg,transparent 30%,rgba(155,89,182,.06) 50%,transparent 70%);
  background-size:200% 200%;animation:secret-shimmer 4s ease-in-out infinite;}
@keyframes secret-shimmer{0%,100%{background-position:0% 0%;}50%{background-position:100% 100%;}}

.ach-inner{padding:18px 18px 14px;}

/* icon + rarity badge row */
.ach-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.ach-icon-wrap{position:relative;flex-shrink:0;}
.ach-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:24px;border:1px solid transparent;}
.fun    .ach-icon{background:rgba(76,187,138,.12); border-color:rgba(76,187,138,.3);}
.lore   .ach-icon{background:rgba(91,141,238,.12); border-color:rgba(91,141,238,.3);}
.secret .ach-icon{background:rgba(155,89,182,.12); border-color:rgba(155,89,182,.3);}

/* rarity tag */
.ach-rarity{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1.5px;
  padding:2px 8px;border-radius:10px;border:1px solid transparent;white-space:nowrap;}
.fun    .ach-rarity{color:var(--fun);   border-color:rgba(76,187,138,.35);  background:rgba(76,187,138,.08);}
.lore   .ach-rarity{color:var(--lore);  border-color:rgba(91,141,238,.35);  background:rgba(91,141,238,.08);}
.secret .ach-rarity{color:var(--secret);border-color:rgba(155,89,182,.35);  background:rgba(155,89,182,.08);}

.ach-title-col{flex:1;min-width:0;}
.ach-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--text);
  margin-bottom:5px;line-height:1.3;}
.fun    .ach-name{color:#a8f0d0;}
.lore   .ach-name{color:#a8c8ff;}
.secret .ach-name{color:#d4a8ff;}

.ach-short{font-size:12px;color:var(--text-dim);line-height:1.5;}

/* expand arrow */
.ach-expand-row{display:flex;justify-content:flex-end;margin-top:8px;}
.ach-arrow{font-size:11px;color:var(--text-dim);transition:transform .25s,color .2s;}
.ach-card.open .ach-arrow{transform:rotate(180deg);}

/* expanded section */
.ach-long{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .25s ease;
  padding:0 18px;border-top:0 solid var(--line);}
.ach-card.open .ach-long{max-height:400px;padding:14px 18px;border-top-width:1px;}

.ach-long-text{font-size:13px;color:var(--text-mid);line-height:1.65;margin-bottom:14px;}

/* date row */
.ach-date-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ach-date-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;color:var(--text-dim);}
.ach-date-val{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:1px;
  padding:2px 10px;border:1px solid var(--gold-d);border-radius:10px;background:rgba(201,168,76,.07);}
.ach-circle-val{font-family:'Cinzel',serif;font-size:10px;color:var(--accent2);letter-spacing:1px;
  padding:2px 10px;border:1px solid rgba(166,127,209,.3);border-radius:10px;
  background:rgba(166,127,209,.07);}

/* participants */
.ach-part-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;
  color:var(--text-dim);margin-bottom:6px;}
.ach-participants{display:flex;flex-wrap:wrap;gap:5px;}
.ach-participant{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;
  padding:3px 10px;border-radius:12px;border:1px solid var(--line);
  color:var(--text-mid);background:var(--panel2);}
.fun    .ach-participant{border-color:rgba(76,187,138,.25); color:#a8f0d0;}
.lore   .ach-participant{border-color:rgba(91,141,238,.25); color:#a8c8ff;}
.secret .ach-participant{border-color:rgba(155,89,182,.25); color:#d4a8ff;}

/* bottom card bar */
.ach-footer{padding:8px 18px;background:rgba(0,0,0,.2);border-top:1px solid rgba(42,31,69,.6);
  display:flex;align-items:center;justify-content:space-between;}
.ach-footer-date{font-family:monospace;font-size:9.5px;color:var(--text-dim);}
.ach-footer-code{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;color:var(--gold);opacity:.7;}

/* empty / loading */
.ach-empty{text-align:center;padding:60px 20px;color:var(--text-dim);}
.ach-empty-icon{font-size:42px;margin-bottom:14px;opacity:.35;}
.ach-empty p{font-size:13px;font-style:italic;}

/* loading skeleton */
.skel{background:linear-gradient(90deg,var(--panel2) 25%,rgba(42,31,69,.4) 50%,var(--panel2) 75%);
  background-size:200% 100%;animation:skel-anim 1.4s ease-in-out infinite;border-radius:4px;}
@keyframes skel-anim{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

@media(max-width:600px){
  .ach-grid{grid-template-columns:1fr;}
  .filter-bar{gap:6px;}
  .stats-line{width:100%;margin-left:0;margin-top:4px;}
}
</style>
</head>
<body>
<div class="sheet">

  <div class="header">
    <a class="back-link" href="index.html">← Меню</a>
    <div class="header-deco"></div>
    <h1>ДОСТИЖЕНИЯ</h1>
    <div class="header-sub">Хроника подвигов &nbsp;•&nbsp; Том II</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active all" data-filter="all" onclick="setFilter('all',this)">
      <span class="filter-dot" style="background:var(--accent2)"></span>Все
    </button>
    <button class="filter-btn fun"    data-filter="fun"    onclick="setFilter('fun',this)">
      <span class="filter-dot" style="background:var(--fun)"></span>Весёлые
    </button>
    <button class="filter-btn lore"   data-filter="lore"   onclick="setFilter('lore',this)">
      <span class="filter-dot" style="background:var(--lore)"></span>Лор
    </button>
    <button class="filter-btn secret" data-filter="secret" onclick="setFilter('secret',this)">
      <span class="filter-dot" style="background:var(--secret)"></span>Секретные
    </button>
    <div class="stats-line" id="stats-line"><span id="stats-count">0</span> достижений</div>
  </div>

  <div class="ach-grid" id="ach-grid">
    <!-- skeleton while loading -->
    <div style="height:120px;border-radius:12px;" class="skel"></div>
    <div style="height:120px;border-radius:12px;" class="skel"></div>
    <div style="height:120px;border-radius:12px;" class="skel"></div>
  </div>

</div>

<script src="config.js"></script>
<script src="sheets.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// Google Sheets format — лист "achievements":
//
//   type         — fun / lore / secret
//   icon         — эмодзи (например 🎲)
//   name         — название достижения
//   short        — краткое описание (видно сразу)
//   long         — длинное описание (при раскрытии)
//   cell         — ячейка хроноса (например AAC4)
//   circle       — круг (например III)
//   participants — имена через запятую (Аргус, Вейн, Кирра)
// ═══════════════════════════════════════════════════════════════════════════

const TYPE_META = {
  fun:    { label:'Весёлая',   icon:'🎲', color:'var(--fun)'    },
  lore:   { label:'Лор',      icon:'📜', color:'var(--lore)'   },
  secret: { label:'Секретная',icon:'🌑', color:'var(--secret)' },
};

let allAchievements = [];
let currentFilter   = 'all';

async function loadAchievements() {
  try {
    const rows = await sheetsGet('achievements');
    allAchievements = rows.map(r => ({
      type:         (r.type         || 'fun').trim().toLowerCase(),
      icon:         (r.icon         || '✦').trim(),
      name:          r.name         || '—',
      short:         r.short        || r['краткое']       || '',
      long:          r.long         || r['описание']      || '',
      cell:         (r.cell         || r['ячейка']        || '').toUpperCase(),
      circle:        r.circle       || r['круг']          || '',
      participants: (r.participants || r['участники']     || '').split(',').map(s=>s.trim()).filter(Boolean),
    })).filter(r => r.name && r.name !== '—');
  } catch(e) {
    allAchievements = DEMO_ACHIEVEMENTS;
  }
  renderAll();
}

function renderAll() {
  const filtered = currentFilter === 'all'
    ? allAchievements
    : allAchievements.filter(a => a.type === currentFilter);

  document.getElementById('stats-count').textContent = filtered.length;
  const grid = document.getElementById('ach-grid');
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = `<div class="ach-empty" style="grid-column:1/-1;">
      <div class="ach-empty-icon">✦</div>
      <p>Достижений этого типа пока нет</p>
    </div>`;
    return;
  }

  filtered.forEach((ach, i) => {
    grid.appendChild(buildCard(ach, i));
  });
}

function buildCard(ach, idx) {
  const meta = TYPE_META[ach.type] || TYPE_META.fun;
  const card = document.createElement('div');
  card.className = `ach-card ${ach.type}`;
  card.dataset.idx = idx;

  // build participants HTML
  const partHtml = ach.participants.length
    ? `<div class="ach-part-label">УЧАСТНИКИ</div>
       <div class="ach-participants">${ach.participants.map(p=>`<span class="ach-participant">${p}</span>`).join('')}</div>`
    : '';

  // date
  const dateHtml = (ach.cell || ach.circle) ? `
    <div class="ach-date-row">
      <span class="ach-date-label">ДАТА</span>
      ${ach.cell   ? `<span class="ach-date-val">${ach.cell}</span>`   : ''}
      ${ach.circle ? `<span class="ach-circle-val">Круг ${ach.circle}</span>` : ''}
    </div>` : '';

  card.innerHTML = `
    <div class="ach-inner">
      <div class="ach-top">
        <div class="ach-icon-wrap">
          <div class="ach-icon">${ach.icon}</div>
        </div>
        <div class="ach-title-col">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
            <span class="ach-rarity">${meta.label.toUpperCase()}</span>
          </div>
          <div class="ach-name">${ach.name}</div>
        </div>
      </div>
      <div class="ach-short">${ach.short}</div>
      <div class="ach-expand-row"><span class="ach-arrow">▼</span></div>
    </div>
    <div class="ach-long">
      ${ach.long ? `<div class="ach-long-text">${ach.long}</div>` : ''}
      ${dateHtml}
      ${partHtml}
    </div>
    <div class="ach-footer">
      <span class="ach-footer-date">${ach.cell ? ach.cell : '—'}</span>
      <span class="ach-footer-code">${ach.circle ? 'Круг ' + ach.circle : ''}</span>
    </div>`;

  card.addEventListener('click', () => toggleCard(card));
  return card;
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.classList.remove('all','fun','lore','secret');
  });
  btn.classList.add('active', type);
  renderAll();
}

// ── Demo data (shown if Sheets not configured) ────────────────────────────
const DEMO_ACHIEVEMENTS = [
  {
    type:'fun', icon:'🎲',
    name:'Первая Кровь',
    short:'Первый бой кампании завершён.',
    long:'Отряд магов вступил в свою первую схватку и вышел из неё победителями. Хаотично, громко, с огнём — именно так и должно быть.',
    cell:'AAA3', circle:'I',
    participants:['Аргус','Вейн','Кирра'],
  },
  {
    type:'lore', icon:'📜',
    name:'Голос Бездны',
    short:'Расшифровано послание из иного круга.',
    long:'В руинах Нижнего Элдроса был обнаружен фрагмент хроники, написанной языком, которого не существует ни в одной известной библиотеке. Её удалось прочитать.',
    cell:'AAB7', circle:'I',
    participants:['Кирра'],
  },
  {
    type:'secret', icon:'🌑',
    name:'???',
    short:'Тайна ещё не раскрыта.',
    long:'Некоторые события лучше не помнить. Но они случились.',
    cell:'AAC1', circle:'II',
    participants:[],
  },
  {
    type:'fun', icon:'🍺',
    name:'Дипломатия Гномов',
    short:'Конфликт разрешён нестандартным методом.',
    long:'Вместо переговоров отряд предложил барону трёхчасовое состязание по распитию тёмного эля. Барон проиграл. Договор подписан.',
    cell:'AAD2', circle:'II',
    participants:['Аргус','Вейн'],
  },
  {
    type:'lore', icon:'🔭',
    name:'Карта Созвездий',
    short:'Все семь звёздных ключей собраны.',
    long:'Семь фрагментов небесной карты, разбросанных по семи городам Элдроса, наконец соединены. Путь к Верхнему Кругу открыт.',
    cell:'AAF5', circle:'II',
    participants:['Аргус','Кирра','Вейн'],
  },
  {
    type:'secret', icon:'✦',
    name:'Нить Судьбы',
    short:'Совпадение, которое не может быть случайным.',
    long:'Три персонажа оказались в одном месте в один момент — и каждый по своей причине. ДМ улыбнулся.',
    cell:'AAG0', circle:'III',
    participants:['Аргус','Вейн','Кирра'],
  },
];

loadAchievements();
</script>
</body>
</html>
